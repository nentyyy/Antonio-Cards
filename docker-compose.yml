services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-cards_arena}
      POSTGRES_USER: ${POSTGRES_USER:-cards_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-cards_pass}
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data

  bot:
    build: .
    restart: unless-stopped
    env_file:
      - .env
    command: python -m app.main_user
    volumes:
      - ./cards_arena_test.db:/app/cards_arena_test.db
      - ./cards_arena_test.db-wal:/app/cards_arena_test.db-wal
      - ./cards_arena_test.db-shm:/app/cards_arena_test.db-shm
    depends_on:
      - postgres

volumes:
  pg_data:
